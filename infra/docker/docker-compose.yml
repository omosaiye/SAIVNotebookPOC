services:
  postgres:
    image: postgres:16-alpine
    container_name: private-llm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-private_llm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-private_llm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private-llm-net

  redis:
    image: redis:7-alpine
    container_name: private-llm-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - private-llm-net

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: private-llm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - private-llm-net

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: private-llm-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - private-llm-net

networks:
  private-llm-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
